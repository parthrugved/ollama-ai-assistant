<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">

    <title>LocalMind</title>
</head>

<body class="bg-gray-50">

    <div class="flex h-screen overflow-hidden">

        <!-- Sidebar -->
        <div class="w-64 bg-white border-r p-4 hidden md:block">
            <img src="{{ url_for('static', filename='favicon.png') }}" width="115">
            <p class="text-gray-500 text-sm mt-2">Local AI Assistant</p>
        </div>

        <!-- Main -->
        <div class="flex flex-col flex-1">

            <!-- Header -->
            <div class="p-4 border-b bg-white flex justify-end">
                <select class="border p-2 rounded">
                    <option>Llama3.1</option>
                </select>
            </div>

            <!-- Chat -->
            <div id="chat" class="flex-1 overflow-y-auto p-6 space-y-6">

                {% for msg in messages %}
                {% if msg.role == "user" %}
                <div class="flex justify-end">
                    <div class="bg-blue-600 text-white px-6 py-3 rounded-2xl max-w-md shadow">
                        {{ msg.text }}
                    </div>
                </div>
                {% else %}
                <div class="flex justify-start">
                    <div class="ai-message bg-white px-6 py-5 rounded-2xl w-full border shadow"
                         data-raw='{{ msg.text | tojson | safe }}'>
                    </div>
                </div>
                {% endif %}
                {% endfor %}

            </div>

            <!-- Input -->
            <div class="p-4 border-t bg-white flex gap-2">
                <input id="prompt" type="text" autocomplete="off" placeholder="Ask something..."
                    class="flex-1 border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400">

                <button onclick="sendMessage()"
                    class="bg-blue-600 text-white px-5 py-3 rounded-lg hover:bg-blue-700 active:scale-95 transition">
                    Send
                </button>
            </div>

        </div>
    </div>

    <!-- 🔥 FIXED Markdown Render -->
    <script>
        function renderMarkdown() {
            document.querySelectorAll(".ai-message").forEach(el => {
                const raw = JSON.parse(el.dataset.raw);  

                el.innerHTML = marked.parse(raw);

                el.querySelectorAll("pre code").forEach((block) => {
                    hljs.highlightElement(block);
                });
            });
        }

        window.onload = renderMarkdown;
    </script>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
