<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">

    <title>LocalMind</title>


</head>

<body class="bg-gray-50">

    <div class="flex h-screen overflow-hidden relative">


        <!-- Overlay (mobile) -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden" onclick="toggleSidebar()">
        </div>

        <!-- Sidebar -->
        <div id="sidebar"
            class="fixed inset-y-0 left-0 w-64 bg-white border-r p-4 transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0 z-50 flex flex-col">

            <div class="flex justify-between items-center mb-4">
                <img src="{{ url_for('static', filename='favicon.png') }}" width="115">
                <button onclick="toggleSidebar()" class="md:hidden text-gray-500">
                    ✖
                </button>
            </div>

            <p class="text-gray-500 text-sm">Local AI Assistant</p>
        </div>

        <!-- Main -->
        <div class="flex flex-col flex-1 min-w-0">

            <!-- Header -->
            <div class="p-4 border-b bg-white flex items-center justify-between md:justify-end">
                <button onclick="toggleSidebar()" class="md:hidden text-gray-500">
                    ☰
                </button>

                <select class="border p-2 rounded">
                    <option>Llama3.1</option>
                </select>
            </div>

            <!-- Chat -->
            <div id="chat" class="flex-1 overflow-y-auto p-6 space-y-6">

                {% for msg in messages %}
                {% if msg.role == "user" %}
                <div class="flex justify-end">
                    <div class="bg-blue-600 text-white px-6 py-3 rounded-2xl max-w-md shadow-sm">
                        {{ msg.text }}
                    </div>
                </div>
                {% else %}
                <div class="flex justify-start">
                    <div class="bg-gray-50 px-6 py-5 rounded-2xl w-full border border-gray-200 shadow-sm">
                        {{ msg.text }}
                    </div>
                </div>
                {% endif %}
                {% endfor %}

            </div>

            <!-- Input -->
            <div class="p-3 md:p-4 border-t bg-white flex gap-2 w-full">

                <input id="prompt" type="text" placeholder="Ask something..." autocomplete="off"
                    class="flex-1 min-w-0 border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400">

                <button onclick="sendMessage()" class="bg-blue-600 text-white px-5 py-3 rounded-lg hover:bg-blue-700 flex-shrink-0 active:scale-95 transition-transform">
                    Send
                </button>

            </div>

        </div>


    </div>

    <!-- Highlight.js -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Your JS -->

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
