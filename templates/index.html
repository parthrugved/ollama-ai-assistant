<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">
    <title>LocalMind</title>
</head>

<body class="bg-gray-50">

    <div class="flex h-screen">

        <!-- Sidebar -->
        <div class="w-64 bg-white border-r p-4">
            <h1 class="text-xl font-bold mb-4">
                <img src="/static/favicon.png" width="115">
            </h1>
            <p class="text-gray-500 text-sm">Local AI Assistant</p>
        </div>

        <!-- Main -->
        <div class="flex flex-col flex-1">

            <!-- Header -->
            <div class="p-4 border-b bg-white">
                <select class="border p-2 rounded">
                    <option>Llama3.1</option>
                </select>
            </div>

            <!-- Chat Area -->
            <div id="chat" class="flex-1 overflow-y-auto p-6 space-y-4">

                {% for msg in messages %}
                {% if msg.role == "user" %}
                <div class="flex justify-end">
                    <div class="bg-blue-500 text-white px-4 py-2 rounded-xl max-w-md">
                        {{ msg.text }}
                    </div>
                </div>
                {% else %}
                <div class="flex justify-start">
                    <div class="bg-gray-200 px-4 py-2 rounded-xl max-w-md">
                        {{ msg.text }}
                    </div>
                </div>
                {% endif %}
                {% endfor %}

            </div>

            <!-- Input Area -->
            <div class="p-4 border-t bg-white flex max-w-full mx-auto w-full">

                <input id="prompt" type="text" placeholder="Ask something..." autocomplete="off"
                    class="flex-grow border border-gray-300 rounded-md p-3 mr-2 focus:outline-none focus:ring-2 focus:ring-blue-400">

                <button onclick="sendMessage()" class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700">
                    Send
                </button>

            </div>

        </div>


    </div>

    <!-- 🔥 STREAMING SCRIPT -->

    <script>
        async function sendMessage() {
            const input = document.getElementById("prompt");
            const chat = document.getElementById("chat");

            const userText = input.value;
            if (!userText) return;

            // 🧑 Add user message
            chat.innerHTML += `
        <div class="flex justify-end">
            <div class="bg-blue-500 text-white px-4 py-2 rounded-xl max-w-md">
                ${userText}
            </div>
        </div>
    `;

            // 🤖 Create AI bubble
            const aiDiv = document.createElement("div");
            aiDiv.className = "flex justify-start";

            const aiBubble = document.createElement("div");
            aiBubble.className = "bg-gray-200 px-4 py-2 rounded-xl max-w-md";

            aiDiv.appendChild(aiBubble);
            chat.appendChild(aiDiv);

            chat.scrollTop = chat.scrollHeight;

            const res = await fetch("/stream", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ prompt: userText })
            });

            const reader = res.body.getReader();
            const decoder = new TextDecoder();

            // 🔥 STREAMING LOOP
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value);
                aiBubble.innerText += chunk;

                chat.scrollTop = chat.scrollHeight;
            }

            input.value = "";
        }

        // ⚡ Enter key support
        document.getElementById("prompt").addEventListener("keypress", function (e) {
            if (e.key === "Enter") sendMessage();
        });
        const chat = document.getElementById("chat");
        chat.scrollTop = chat.scrollHeight;
    </script>

</body>

</html>
